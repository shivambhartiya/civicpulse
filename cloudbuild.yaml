steps:
  # Build Docker image with all Next.js public env vars as build args.
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: bash
    args:
      - '-c'
      - |
        docker build \
          --build-arg NEXT_PUBLIC_FIREBASE_API_KEY="$$NEXT_PUBLIC_FIREBASE_API_KEY" \
          --build-arg NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN="$$NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN" \
          --build-arg NEXT_PUBLIC_FIREBASE_PROJECT_ID="$$NEXT_PUBLIC_FIREBASE_PROJECT_ID" \
          --build-arg NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET="$$NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET" \
          --build-arg NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID="$$NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID" \
          --build-arg NEXT_PUBLIC_FIREBASE_APP_ID="$$NEXT_PUBLIC_FIREBASE_APP_ID" \
          --build-arg NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID="$$NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID" \
          --build-arg NEXT_PUBLIC_GOOGLE_MAPS_API_KEY="$$NEXT_PUBLIC_GOOGLE_MAPS_API_KEY" \
          --build-arg NEXT_PUBLIC_GOOGLE_MAPS_ID="$$NEXT_PUBLIC_GOOGLE_MAPS_ID" \
          --build-arg NEXT_PUBLIC_APP_URL="$$NEXT_PUBLIC_APP_URL" \
          -t us-central1-docker.pkg.dev/$PROJECT_ID/civicpulse/app:$COMMIT_SHA \
          .
    secretEnv:
      - NEXT_PUBLIC_FIREBASE_API_KEY
      - NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
      - NEXT_PUBLIC_FIREBASE_PROJECT_ID
      - NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
      - NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
      - NEXT_PUBLIC_FIREBASE_APP_ID
      - NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID
      - NEXT_PUBLIC_GOOGLE_MAPS_API_KEY
      - NEXT_PUBLIC_GOOGLE_MAPS_ID
      - NEXT_PUBLIC_APP_URL

  # Push to Artifact Registry.
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/civicpulse/app:$COMMIT_SHA'

  # Deploy to Cloud Run.
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'civicpulse'
      - '--image=us-central1-docker.pkg.dev/$PROJECT_ID/civicpulse/app:$COMMIT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--memory=1Gi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=10'
      - '--set-secrets=GEMINI_API_KEY=gemini-api-key:latest,FIREBASE_ADMIN_PRIVATE_KEY=firebase-admin-key:latest,FIREBASE_ADMIN_CLIENT_EMAIL=firebase-admin-email:latest,FIREBASE_ADMIN_PROJECT_ID=firebase-admin-project:latest'
      - '--set-env-vars=NODE_ENV=production,NEXT_PUBLIC_USE_FIREBASE_EMULATORS=false'

images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/civicpulse/app:$COMMIT_SHA'

# Secret Manager bindings.
# These secrets must be created in Google Secret Manager before running.
# Command to create each one:
#   gcloud secrets create NEXT_PUBLIC_FIREBASE_API_KEY --data-file=- <<< "your-value"
availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/next-public-firebase-api-key/versions/latest
      env: NEXT_PUBLIC_FIREBASE_API_KEY
    - versionName: projects/$PROJECT_ID/secrets/next-public-firebase-auth-domain/versions/latest
      env: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    - versionName: projects/$PROJECT_ID/secrets/next-public-firebase-project-id/versions/latest
      env: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    - versionName: projects/$PROJECT_ID/secrets/next-public-firebase-storage-bucket/versions/latest
      env: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    - versionName: projects/$PROJECT_ID/secrets/next-public-firebase-messaging-sender-id/versions/latest
      env: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    - versionName: projects/$PROJECT_ID/secrets/next-public-firebase-app-id/versions/latest
      env: NEXT_PUBLIC_FIREBASE_APP_ID
    - versionName: projects/$PROJECT_ID/secrets/next-public-firebase-measurement-id/versions/latest
      env: NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID
    - versionName: projects/$PROJECT_ID/secrets/next-public-google-maps-api-key/versions/latest
      env: NEXT_PUBLIC_GOOGLE_MAPS_API_KEY
    - versionName: projects/$PROJECT_ID/secrets/next-public-google-maps-id/versions/latest
      env: NEXT_PUBLIC_GOOGLE_MAPS_ID
    - versionName: projects/$PROJECT_ID/secrets/next-public-app-url/versions/latest
      env: NEXT_PUBLIC_APP_URL
