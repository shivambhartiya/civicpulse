steps:
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: bash
    args:
      - '-c'
      - |
        docker build \
          --build-arg NEXT_PUBLIC_GOOGLE_MAPS_API_KEY="${_NEXT_PUBLIC_GOOGLE_MAPS_API_KEY}" \
          --build-arg NEXT_PUBLIC_GOOGLE_MAPS_ID="${_NEXT_PUBLIC_GOOGLE_MAPS_ID}" \
          --build-arg NEXT_PUBLIC_APP_URL="${_NEXT_PUBLIC_APP_URL}" \
          -t ${_REGION}-docker.pkg.dev/$PROJECT_ID/civicpulse/app:$COMMIT_SHA \
          .

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/civicpulse/app:$COMMIT_SHA'

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'civicpulse'
      - '--image=${_REGION}-docker.pkg.dev/$PROJECT_ID/civicpulse/app:$COMMIT_SHA'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--memory=1Gi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=1'
      - '--set-env-vars=NODE_ENV=production,CIVICPULSE_DATA_DIR=/tmp/civicpulse-data'

images:
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/civicpulse/app:$COMMIT_SHA'

substitutions:
  _REGION: us-central1
  _NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ''
  _NEXT_PUBLIC_GOOGLE_MAPS_ID: ''
  _NEXT_PUBLIC_APP_URL: ''
